<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pebble POS</title>
    <link rel="icon" type="image/png" href="pebble.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="notification-container" class="notification-container"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Pebble POS</h1>
            <p>Welcome back! Please login to continue.</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray);"></i>
                    <input type="text" id="username" required placeholder="Enter your username" style="padding-left: 40px;">
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gray);"></i>
                    <input type="password" id="password" required placeholder="Enter your password" style="padding-left: 40px;">
                </div>
            </div>
            
            <button type="submit" class="btn-auth">
                Login <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
        </div>
    </div>
</div>

<script>
// Define the notification function for the login page
function showNotification(message, type = 'success') {
    const container = document.getElementById('notification-container');
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    notif.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
    
    container.appendChild(notif);
    
    setTimeout(() => {
        notif.classList.add('hiding'); 
        notif.addEventListener('animationend', () => {
            notif.remove();
        });
    }, 3000);
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const btn = e.target.querySelector('button');
    const originalText = btn.innerHTML;
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
    btn.disabled = true;

    try {
        const response = await fetch('api/auth_login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.status === 403 && data.redirect) {
            // Redirect suspended/inactive users immediately
            window.location.href = data.redirect;
        } else if (response.ok) {
            // Role-based routing: Send developers to their own dashboard
            if (data.user && data.user.role === 'developer') {
                window.location.href = 'developer.php';
            } else {
                window.location.href = 'index.php'; // Admins and Cashiers go to POS
            }
        } else {
            // Use the custom notification bubble instead of alert()
            showNotification("Invalid account", "error");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    } catch (error) {
        console.error('Error:', error);
        // Use the custom notification bubble for connection errors too
        showNotification("Connection error. Please try again.", "error");
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});
</script>

</body>
</html>
